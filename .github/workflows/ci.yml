name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTICKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Build macOS icon
        run: bash scripts/build-macos-icon.sh
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTICKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  test-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        shell: bash
        run: bash scripts/bootstrap-third-party.sh
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTICKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  build-app-linux:
    runs-on: ubuntu-22.04
    needs: test-linux
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build application
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target stickinthemd

  build-app-macos:
    runs-on: macos-14
    needs: test-macos
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Build macOS icon
        run: bash scripts/build-macos-icon.sh
      - name: Build application
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target stickinthemd

  build-app-windows:
    runs-on: windows-2022
    needs: test-windows
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        shell: bash
        run: bash scripts/bootstrap-third-party.sh
      - name: Build application
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target stickinthemd
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-installer.ps1 -SkipBuild
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: StickInTheMD-windows-setup
          path: dist/StickInTheMD-*-setup.exe
