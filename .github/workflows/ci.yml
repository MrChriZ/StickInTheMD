name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    uses: ./.github/workflows/reusable-tests.yml

  build-app-linux:
    runs-on: ubuntu-22.04
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build application
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target stuckinthemd

  build-app-macos:
    runs-on: macos-14
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Build macOS icon
        run: bash scripts/build-macos-icon.sh
      - name: Build application
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target stuckinthemd

  build-app-windows:
    runs-on: windows-2022
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        shell: bash
        run: bash scripts/bootstrap-third-party.sh
      - name: Build application
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target stuckinthemd
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-installer.ps1 -SkipBuild
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: StuckInTheMD-windows-setup
          path: dist/StuckInTheMD-*-setup.exe
