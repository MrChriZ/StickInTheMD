name: Reusable tests

on:
  workflow_call:

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTUCKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        run: bash scripts/bootstrap-third-party.sh
      - name: Build macOS icon
        run: bash scripts/build-macos-icon.sh
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTUCKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  test-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap third_party
        shell: bash
        run: bash scripts/bootstrap-third-party.sh
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTUCKINTHEMD_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
