name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tests:
    uses: ./.github/workflows/reusable-tests.yml

  release-windows:
    runs-on: windows-2022
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap third_party
        shell: bash
        run: bash scripts/bootstrap-third-party.sh

      - name: Build application
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target stuckinthemd

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-installer.ps1 -SkipBuild

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path CMakeLists.txt -Pattern 'project\s*\(\s*StuckInTheMD\s+VERSION\s+([0-9.]+)').Matches[0].Groups[1].Value
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes-v${{ steps.ver.outputs.version }}.md
          files: |
            dist/StuckInTheMD-*-setup.exe
            THIRD_PARTY_NOTICES.md
